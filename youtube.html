<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<meta name="referrer" content="strict-origin-when-cross-origin" />
	<title>GMod Party Cinema Player</title>
	<link rel="preconnect" href="https://www.youtube.com" crossorigin>
	<link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin>
	<style>
		html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
		#p { width:100%; height:100%; position:fixed; top:0; left:0; background:#000; }
	</style>
</head>
<body>
	<div id="p"></div>
	<script>
		// Read v (video id) + t (start seconds) from the URL hash, then query string.
		function getP(name) {
			var h = window.location.hash.substring(1);
			if (h) { var hp = new URLSearchParams(h); if (hp.get(name)) return hp.get(name); }
			var q = new URLSearchParams(window.location.search);
			return q.get(name);
		}

		var tag = document.createElement('script');
		tag.src = "https://www.youtube.com/iframe_api";
		document.head.appendChild(tag);

		var player = null, ready = false;
		var VARS = {
			controls: 0, rel: 0, loop: 0, disablekb: 1, enablejsapi: 1,
			muted: 1, cc_load_policy: 0, iv_load_policy: 3, autoplay: 1,
			modestbranding: 1, playsinline: 1
		};

		function onYouTubeIframeAPIReady() {
			var vid = getP('v');
			if (!vid || !/^[a-zA-Z0-9_-]{11}$/.test(vid)) vid = 'dQw4w9WgXcQ';
			var t = Math.max(0, parseFloat(getP('t')) || 0);

			player = new YT.Player('p', {
				height: '100%', width: '100%', videoId: vid,
				host: 'https://www.youtube-nocookie.com',
				playerVars: Object.assign({}, VARS, { start: Math.floor(t) }),
				events: {
					onReady: function () {
						ready = true;
						try { player.unloadModule('captions'); } catch (e) {}
						if (t > 0) player.seekTo(t, true);
						player.playVideo();
					}
				}
			});

			// Control surface the GMod entity drives via RunJavascript.
			window.gp = {
				load: function (id, t) { if (ready && player) { player.loadVideoById(id, t || 0); player.playVideo(); } },
				vol:  function (v) {
					if (!ready || !player) return;
					if (v <= 0) { player.mute(); }
					else { if (player.isMuted()) player.unMute(); player.setVolume(v); }
				},
				seek: function (t) { if (ready && player) player.seekTo(t, true); },
				poke: function () {
					if (ready && player && player.getPlayerState) {
						var st = player.getPlayerState();
						if (st !== 1 && st !== 3) player.playVideo();
					}
				}
			};
		}
	</script>
</body>
</html>
