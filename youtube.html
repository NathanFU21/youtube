<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<meta name="referrer" content="strict-origin-when-cross-origin" />
	<title>GMod Party Cinema Player</title>
	<style>
		html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}
		#p,#vid,#tw{width:100%;height:100%;position:fixed;top:0;left:0;background:#000}
		#vid{object-fit:contain;display:none}
		#tw{display:none;border:0}
		#tw iframe{width:100%;height:100%;border:0}
	</style>
</head>
<body>
	<div id="p"></div>
	<video id="vid" playsinline muted></video>
	<div id="tw"></div>
	<script src="https://player.twitch.tv/js/embed/v1.js"></script>
	<script>
		function getP(n){ var h=window.location.hash.substring(1);
			if(h){var hp=new URLSearchParams(h); if(hp.get(n)!==null) return hp.get(n);}
			var q=new URLSearchParams(window.location.search); return q.get(n); }
		function b64urlDecode(s){ try{ s=s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; return atob(s);}catch(e){return '';} }

		var vidEl=document.getElementById('vid'), twEl=document.getElementById('tw'), ytEl=document.getElementById('p');
		var mode=null, player=null, ready=false, twp=null;
		var VARS={controls:0,rel:0,loop:0,disablekb:1,enablejsapi:1,muted:1,cc_load_policy:0,iv_load_policy:3,autoplay:1,modestbranding:1,playsinline:1};

		function show(m){ mode=m; ytEl.style.display=(m==='yt')?'block':'none'; vidEl.style.display=(m==='file')?'block':'none'; twEl.style.display=(m==='tw')?'block':'none'; }

		// ---- YouTube API ----
		var tag=document.createElement('script'); tag.src="https://www.youtube.com/iframe_api"; document.head.appendChild(tag);
		function onYouTubeIframeAPIReady(){
			var vid=getP('v'), f=getP('f'), tw=getP('tw');
			var t=Math.max(0, parseFloat(getP('t'))||0);
			player=new YT.Player('p',{height:'100%',width:'100%',videoId:(vid&&/^[a-zA-Z0-9_-]{11}$/.test(vid))?vid:'dQw4w9WgXcQ',
				host:'https://www.youtube-nocookie.com',
				playerVars:Object.assign({},VARS,{start:Math.floor(t)}),
				events:{onReady:function(){ ready=true; try{player.unloadModule('captions');}catch(e){}
					if(f){ gp.loadFile(f,t); } else if(tw){ gp.loadTwitch(tw); } else { show('yt'); if(t>0)player.seekTo(t,true); player.playVideo(); } }}});
		}

		function twParent(){ var h=window.location.hostname; return h?[h]:['localhost']; }

		window.gp={
			load:function(id,t){ show('yt'); if(ready&&player){ player.loadVideoById(id,t||0); player.playVideo(); } },
			loadFile:function(b64,t){ var url=b64urlDecode(b64); if(!url)return; show('file');
				if(ready&&player&&player.stopVideo){try{player.stopVideo();}catch(e){}}
				vidEl.src=url; vidEl.currentTime=t||0; vidEl.muted=true; var pr=vidEl.play(); if(pr&&pr.catch)pr.catch(function(){}); },
			loadTwitch:function(ref){ show('tw');
				if(ready&&player&&player.stopVideo){try{player.stopVideo();}catch(e){}}
				twEl.innerHTML=''; twp=null;
				var kind=ref.charAt(0), val=ref.substring(2);
				var opts={width:'100%',height:'100%',parent:twParent(),autoplay:true,muted:true,controls:false};
				if(kind==='c'){ opts.channel=val; } else if(kind==='v'){ opts.video=val; } else if(kind==='l'){ opts.collection=undefined; opts.video=undefined; twEl.innerHTML='<iframe src="https://clips.twitch.tv/embed?clip='+encodeURIComponent(val)+'&parent='+window.location.hostname+'&autoplay=true&muted=true" allowfullscreen></iframe>'; return; }
				try{ twp=new Twitch.Player('tw', opts); twp.setMuted(true); }catch(e){}
			},
			vol:function(v){
				if(mode==='file'){ vidEl.muted=(v<=0); vidEl.volume=Math.max(0,Math.min(1,v/100)); return; }
				if(mode==='tw'){ if(twp){ try{ twp.setMuted(v<=0); twp.setVolume(Math.max(0,Math.min(1,v/100))); }catch(e){} } return; }
				if(ready&&player){ if(v<=0){player.mute();} else {if(player.isMuted())player.unMute(); player.setVolume(v);} }
			},
			seek:function(t){ if(mode==='file'){ vidEl.currentTime=t; } else if(mode==='yt'&&ready&&player){ player.seekTo(t,true);} },
			poke:function(){
				if(mode==='file'){ if(vidEl.paused){ var pr=vidEl.play(); if(pr&&pr.catch)pr.catch(function(){}); } return; }
				if(mode==='yt'&&ready&&player&&player.getPlayerState){ var st=player.getPlayerState(); if(st!==1&&st!==3){ player.playVideo(); } }
			}
		};

		// fast paths that don't need the YT API
		(function(){ var f=getP('f'); var tw=getP('tw');
			if(f){ var t=Math.max(0,parseFloat(getP('t'))||0); show('file'); var url=b64urlDecode(f); if(url){ vidEl.src=url; vidEl.currentTime=t; var pr=vidEl.play(); if(pr&&pr.catch)pr.catch(function(){}); } }
			else if(tw){ gp.loadTwitch(tw); }
		})();
	</script>
</body>
</html>
